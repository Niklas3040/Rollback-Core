[FilterPlugin]
; Files listed here are staged with the plugin in packaged builds as non-UFS files.
; Paths are relative to the plugin root and use Unreal's standard wildcards:
;   *   single path component
;   ?   single character
;   ... recursive directory match
;
; Rollback Core's OSS distribution has no runtime-loaded non-UFS assets;
; everything ships as cooked content. Add entries here if your fork
; introduces files that must bypass the cooked asset pipeline.
